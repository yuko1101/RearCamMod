name: Build

on:
  push:
  pull_request:

permissions:
  contents: write

env:
  release: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        loader: [fabric, neoforge]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Environment Variables
        if: ${{ env.release == 'true' }}
        shell: bash
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          cat gradle.properties | grep minecraft_version | sed -n -r "s/^minecraft_version=(.+)$/\1/p" | xargs -I {} echo "MINECRAFT_VERSION={}" >> $GITHUB_ENV

      - name: Set Project Version
        if: ${{ env.release == 'true' }}
        shell: bash
        run: |
          sed -i -r "s/^mod_version=.+$/mod_version=$VERSION/" gradle.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@417ae3ccd767c252f5661f1ace9f835f9654f2b5 # v3.1.0
        with:
          gradle-version: '8.11'

      - name: Build with Gradle
        run: gradle build
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.loader }}
          path: ${{ matrix.loader }}/build/libs/*.jar

      - name: Get Artifact Paths
        if: ${{ env.release == 'true' }}
        shell: bash
        run: |
          ls -d ${{ matrix.loader }}/build/libs/*.jar | awk '{print length($1), $1}' | sort -nk 1 | head -1 | sed -n -r "s/^[0-9]+ (.+)$/\1/p" | xargs -I {} echo "ARTIFACT_FILE={}" >> $GITHUB_ENV

      - name: Publish to Modrinth
        if: ${{ env.release == 'true' }}
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: APh3E9kg
          version: ${{ env.VERSION }}
          loaders: ${{ matrix.loader }}
          game-versions: ${{ env.MINECRAFT_VERSION }}
          files: ${{ env.ARTIFACT_FILE }}
          changelog: ${{ github.event.release.body }}
  create-release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create Release
        if: ${{ env.release == 'true' }}
        run: |
          gh release create ${{ github.ref_name }} --generate-notes ./artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}